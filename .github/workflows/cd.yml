name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  CI: true

jobs:
  backend-deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && vars.BACKEND_DEPLOY_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run backend tests
        run: npm test

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.BACKEND_SSH_HOST }}
          SSH_PORT: ${{ secrets.BACKEND_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/backend_deploy_key
          chmod 600 ~/.ssh/backend_deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend over SSH
        env:
          SSH_HOST: ${{ secrets.BACKEND_SSH_HOST }}
          SSH_PORT: ${{ secrets.BACKEND_SSH_PORT }}
          SSH_USER: ${{ secrets.BACKEND_SSH_USER }}
          APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          PM2_PROCESS: ${{ secrets.BACKEND_PM2_PROCESS }}
        run: |
          ssh -i ~/.ssh/backend_deploy_key -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "APP_DIR='$APP_DIR' PM2_PROCESS='${PM2_PROCESS:-quest-backend}' bash -s" <<'SCRIPT'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main
          cd backend
          npm ci
          npm run prisma:generate
          npm run prisma:migrate:deploy
          pm2 restart "$PM2_PROCESS" --update-env
          pm2 save
          SCRIPT
